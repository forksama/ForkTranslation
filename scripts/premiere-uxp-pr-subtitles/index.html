<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <title>PR Subtitles</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main>
      <h1>PR Subtitles 0.4.0</h1>

      <div class="buttons">
        <button id="chooseJsonButton" type="button">Choose Subtitle JSON</button>
        <button id="chooseOutputButton" type="button">Choose Output Folder</button>
      </div>

      <div class="outputs">
        <label>Subtitle JSON</label>
        <output id="jsonPath">No JSON selected</output>
        <label>Output Folder</label>
        <output id="outputPath">No output folder selected</output>
      </div>

      <div class="buttons">
        <button id="runButton" class="primary" type="button">Generate SRTs</button>
        <button id="clearButton" type="button">Clear Log</button>
        <button id="saveLogButton" type="button">Save Log</button>
      </div>

      <output id="status">Idle</output>

      <section>
        <h2>Preview</h2>
        <pre id="preview">Choose a subtitle JSON file.</pre>
      </section>

      <section class="logSection">
        <h2>Log</h2>
        <pre id="log"></pre>
      </section>
    </main>
    <script src="index.js"></script>
  </body>
</html>
