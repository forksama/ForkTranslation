<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Image Bottom Pulse</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main>
      <h1>Image Bottom Pulse 0.1.2</h1>

      <div class="field">
        <label for="trackSpec">Video tracks</label>
        <input id="trackSpec" type="text" value="V1" placeholder="V1,V3 or V1-V3 or all">
      </div>

      <div class="fields">
        <label for="heightMultiplier">Start height</label>
        <input id="heightMultiplier" type="text" value="1.035" placeholder="1.035">

        <label for="pulseSeconds">Pulse duration (s)</label>
        <input id="pulseSeconds" type="text" value="0.5" placeholder="0.5">

        <label for="baseScale">Base scale %</label>
        <input id="baseScale" type="text" placeholder="auto">

        <label for="curveSpec">Rate curve</label>
        <input id="curveSpec" type="text" value="0.19,1,0.22,1" placeholder="x1,y1,x2,y2">

        <label for="curveSamples">Curve samples</label>
        <input id="curveSamples" type="text" value="8" placeholder="8">
      </div>

      <label class="check">
        <input id="tryUnknown" type="checkbox" checked>
        <span>Try unknown-extension clips</span>
      </label>

      <div class="buttons">
        <button id="runButton" type="button">Run</button>
        <button id="clearButton" type="button">Clear Log</button>
        <button id="saveLogButton" type="button">Save Log</button>
      </div>

      <output id="status">Idle</output>
      <pre id="log"></pre>
    </main>
    <script src="index.js"></script>
  </body>
</html>
