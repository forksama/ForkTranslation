<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Audio Prefix Importer</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main>
      <h1>Audio Prefix Importer 0.1.2</h1>

      <div class="buttons">
        <button id="chooseFolderButton" type="button">Choose Folder</button>
        <button id="rescanButton" type="button">Rescan</button>
      </div>

      <output id="folderPath">No folder selected</output>

      <div class="fields">
        <label for="intervalSeconds">Gap seconds</label>
        <input id="intervalSeconds" type="text" value="0.5" placeholder="0.5">

        <label for="audioTrackSpec">Target audio track</label>
        <select id="audioTrackSpec">
          <option value="new" selected>new</option>
          <option value="auto">auto</option>
        </select>
      </div>

      <div class="buttons">
        <button id="runButton" class="primary" type="button">Import To Track</button>
        <button id="clearButton" type="button">Clear Log</button>
        <button id="saveLogButton" type="button">Save Log</button>
      </div>

      <output id="status">Idle</output>

      <section>
        <h2>Matched Files</h2>
        <pre id="filePreview"></pre>
      </section>

      <section class="logSection">
        <h2>Log</h2>
        <pre id="log"></pre>
      </section>
    </main>
    <script src="index.js"></script>
  </body>
</html>
