<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Portrait Map Importer</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main>
      <h1>Portrait Map Importer 0.1.0</h1>

      <div class="buttons">
        <button id="chooseMappingButton" type="button">Choose Mapping File</button>
        <button id="chooseWorkdirButton" type="button">Choose Workdir</button>
      </div>

      <div class="outputs">
        <label>Mapping</label>
        <output id="mappingPath">No mapping selected</output>
        <label>Workdir</label>
        <output id="workdirPath">No workdir selected</output>
      </div>

      <div class="buttons">
        <button id="choosePortraitDirButton" type="button">Choose Portrait Dir</button>
      </div>

      <div class="outputs">
        <label>Portrait Dir</label>
        <output id="portraitDirPath">No portrait dir selected</output>
      </div>

      <p class="hint">
        Portrait Dir must use the same logical base level as GPT-SoVITS and VOICEVOX.
      </p>

      <div class="fields">
        <label for="audioTrackSpec">Source audio track</label>
        <input id="audioTrackSpec" type="text" value="A1" placeholder="A1">

        <label for="videoTrackSpec">Target video track</label>
        <select id="videoTrackSpec">
          <option value="new" selected>new</option>
          <option value="auto">auto</option>
        </select>
      </div>

      <div class="buttons">
        <button id="scanButton" type="button">Scan</button>
        <button id="runButton" class="primary" type="button">Import Portraits</button>
        <button id="clearButton" type="button">Clear Log</button>
        <button id="saveLogButton" type="button">Save Log</button>
      </div>

      <output id="status">Idle</output>

      <section>
        <h2>Preview</h2>
        <pre id="preview"></pre>
      </section>

      <section class="logSection">
        <h2>Log</h2>
        <pre id="log"></pre>
      </section>
    </main>
    <script src="index.js"></script>
  </body>
</html>
